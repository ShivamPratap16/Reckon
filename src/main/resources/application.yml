# ─── Environment overrides ────────────────────────────────────────────────────
# The following settings are driven by environment variables (shown as defaults):
#   DB_URL, DB_USER, DB_PASSWORD  — Postgres connection
#   REDIS_HOST, REDIS_PORT        — Redis connection
#   KAFKA_BOOTSTRAP               — Kafka broker(s)
#   JWT_SECRET                    — MUST be overridden in prod (app fails fast otherwise)
#   OTEL_EXPORTER_OTLP_ENDPOINT   — OpenTelemetry collector (blank = disabled)
# ─────────────────────────────────────────────────────────────────────────────
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reckon}
    username: ${DB_USER:reckon}
    password: ${DB_PASSWORD:reckon}
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 200ms
      lettuce:
        shutdown-timeout: 100ms
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: reckon
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: reckon
  defaults:
    metrics:
      export:
        enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}
reckon:
  idempotency:
    cache:
      enabled: true       # tests without Redis set false; the Redis test sets true
      ttl-hours: 24
  ledger:
    optimistic-max-retries: 20
  saga:
    recovery:
      enabled: true          # disabled in tests; tests call recover() directly
      stale-seconds: 30      # how long a saga may sit in BANK_PENDING before reconciling
      poll-ms: 5000
      max-attempts: 3
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-must-be-at-least-256-bits-long-xxxxx}
    ttl-minutes: 60
  consumers:
    enabled: true
  rewards:
    cashback-bps: 100
  outbox:
    topic: payment-events
    scheduler:
      enabled: true
    batch-size: 100
    send-timeout-ms: 10000
  reconciliation:
    enabled: true          # scheduled audit on in prod; tests disable + call run() directly
    stale-seconds: 3600    # PENDING older than 1h is "stuck"
    poll-ms: 60000
  holds:
    expiry:
      enabled: true
      poll-ms: 30000
      batch-size: 100
