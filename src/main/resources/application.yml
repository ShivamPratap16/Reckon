spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/walletx}
    username: ${DB_USER:walletx}
    password: ${DB_PASSWORD:walletx}
  flyway:
    enabled: true
walletx:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-must-be-at-least-256-bits-long-xxxxx}
    ttl-minutes: 60
