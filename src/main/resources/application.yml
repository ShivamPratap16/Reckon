spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reckon}
    username: ${DB_USER:reckon}
    password: ${DB_PASSWORD:reckon}
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: reckon
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
reckon:
  saga:
    recovery:
      enabled: true          # disabled in tests; tests call recover() directly
      stale-seconds: 30      # how long a saga may sit in BANK_PENDING before reconciling
      poll-ms: 5000
      max-attempts: 3
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-must-be-at-least-256-bits-long-xxxxx}
    ttl-minutes: 60
  consumers:
    enabled: true
  rewards:
    cashback-bps: 100
  outbox:
    topic: payment-events
    scheduler:
      enabled: true
    batch-size: 100
    send-timeout-ms: 10000
  reconciliation:
    enabled: true          # scheduled audit on in prod; tests disable + call run() directly
    stale-seconds: 3600    # PENDING older than 1h is "stuck"
    poll-ms: 60000
